<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- FIXES BLOCKED CONTENT -->
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <link rel="apple-touch-icon" href="https://flaticon.com">

    <style>
        body { background-color: #000; color: #fff; margin: 0; padding: 15px; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; }
        #clock { font-size: 3.5rem; font-weight: 200; margin: 10px 0; }
        .section-title { font-size: 0.75rem; text-transform: uppercase; color: #666; margin: 25px 0 10px; width: 100%; max-width: 400px; font-weight: bold; }
        .container { width: 100%; max-width: 400px; }
        #alert-banner { display: none; background: #ff3b30; color: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; font-weight: bold; width: 100%; text-align: center; }
        iframe { width: 100%; border-radius: 15px; border: none; background: #111; height: 350px; }
        .radar-card { background: #333; padding: 20px; border-radius: 15px; text-align: center; text-decoration: none; color: white; display: block; }
    </style>
</head>
<body>

    <div id="alert-banner">⚠️ SEVERE WEATHER ALERT</div>
    <div id="clock">00:00</div>

    <div class="container">
        <div class="section-title">Forecast</div>
        <!-- WEATHERWIDGET.IO FIXED SCRIPT -->
        <a class="weatherwidget-io" href="https://forecast7.com" data-label_1="BROOKLYN PARK" data-label_2="WEATHER" data-theme="pure">BROOKLYN PARK</a>
        <script>
        !function(d,s,id){var js,fjs=d.getElementsByTagName(s)[0];if(!d.getElementById(id)){js=d.createElement(s);js.id=id;js.src='https://weatherwidget.io;}}(document,'script','weatherwidget-io-js');
        </script>

        <div class="section-title">Air Quality</div>
        <!-- STABLE AQI WIDGET -->
        <iframe src="https://airnow.gov"></iframe>

        <div class="section-title">Radar</div>
        <a href="https://wunderground.com" class="radar-card">🛰️ Launch Interactive Radar</a>
    </div>

    <script>
        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        setInterval(updateClock, 1000); updateClock();

        async function checkAlerts() {
            try {
                const res = await fetch(`https://weather.gov`);
                const data = await res.json();
                if (data.features.length > 0) document.getElementById('alert-banner').style.display = 'block';
            } catch (e) {}
        }
        checkAlerts();
    </script>
</body>
</html>
